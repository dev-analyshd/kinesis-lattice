kind = "web"
previewPath = "/"
title = "KINESIS Dashboard"
version = "1.0.0"
id = "artifacts/kinesis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23195

[services.development]
run = "pnpm --filter @workspace/kinesis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kinesis", "run", "build" ]
publicDir = "artifacts/kinesis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23195"
BASE_PATH = "/"
