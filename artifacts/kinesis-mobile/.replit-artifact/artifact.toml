kind = "mobile"
previewPath = "/kinesis-mobile/"
title = "KINESIS Mobile"
version = "1.0.0"
id = "artifacts/kinesis-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/kinesis-mobile/" ]
localPort = 20472

[services.development]
run = "pnpm --filter @workspace/kinesis-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kinesis-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kinesis-mobile", "run", "serve" ]

[services.env]
PORT = "20472"
BASE_PATH = "/kinesis-mobile/"
