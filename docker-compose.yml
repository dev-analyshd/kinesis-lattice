version: '3.8'

services:
  kinesis-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: kinesis-api
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - API_PORT=8080
      - MOCK_DATA_FOR_DEMO=true
      - DEMO_AGENT_COUNT=5
      - T3N_ENVIRONMENT=testnet
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - kinesis-net

  kinesis-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: kinesis-dashboard
    ports:
      - "3000:3000"
    command: ["node", "dashboard/node_modules/.bin/next", "start", "-p", "3000"]
    environment:
      - NODE_ENV=production
      - DASHBOARD_PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    depends_on:
      kinesis-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kinesis-net

networks:
  kinesis-net:
    driver: bridge

volumes:
  kinesis-logs:
